<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation — CodeRunner</title>
    <meta name="description" content="Official documentation for CodeRunner — a desktop PHP & Laravel code execution engine.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: #0d0d0d;
            --surface-2: #111;
            --border: #1a1a1a;
            --border-bright: #2a2a2a;
            --text: #e8e8e8;
            --muted: #555;
            --subtitle: #888;
            --accent: #fff;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* ─── TOP NAV ─── */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(3, 3, 3, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            gap: 1.5rem;
            z-index: 200;
        }

        .topbar-brand {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }
        .topbar-brand span { color: var(--muted); }

        .topbar-sep {
            width: 1px;
            height: 20px;
            background: var(--border-bright);
        }

        .topbar-title {
            font-size: 0.85rem;
            color: var(--subtitle);
            font-weight: 400;
        }

        .topbar-links {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .topbar-links a {
            color: var(--subtitle);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            transition: color 0.2s;
        }
        .topbar-links a:hover { color: var(--accent); }

        .topbar-links .btn-dl {
            background: var(--accent);
            color: #000;
            padding: 0.4rem 0.9rem;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border: 1px solid var(--accent);
            transition: all 0.2s;
        }
        .topbar-links .btn-dl:hover { background: transparent; color: var(--accent); }

        /* ─── LAYOUT ─── */
        .layout {
            display: flex;
            min-height: 100vh;
            padding-top: 56px;
        }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            position: fixed;
            top: 56px; left: 0;
            height: calc(100vh - 56px);
            overflow-y: auto;
            padding: 2rem 0;
            background: var(--bg);
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

        .sidebar-section {
            padding: 0 1.5rem;
            margin-bottom: 2rem;
        }

        .sidebar-heading {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-nav {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-nav a {
            display: block;
            padding: 0.35rem 0.75rem;
            color: var(--subtitle);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 2px;
            transition: all 0.15s;
            border-left: 2px solid transparent;
        }
        .sidebar-nav a:hover {
            color: var(--text);
            border-left-color: var(--border-bright);
            background: rgba(255,255,255,0.03);
        }
        .sidebar-nav a.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        /* ─── MAIN CONTENT ─── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-width: 0;
            padding: 3.5rem 4rem 6rem;
            max-width: 800px;
        }

        /* ─── ACTION BUTTONS (for in-app iframe mode) ─── */
        .action-strip {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .action-btn {
            background: var(--surface-2);
            border: 1px solid var(--border-bright);
            color: var(--text);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--subtitle); }
        .action-btn.secondary { color: var(--subtitle); }

        /* ─── TYPOGRAPHY ─── */
        #content h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            line-height: 1.1;
            color: var(--accent);
        }

        #content > p:first-of-type {
            font-size: 1.05rem;
            color: var(--subtitle);
            font-weight: 300;
            margin-bottom: 3rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
        }

        #content h2 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            margin: 3rem 0 1rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--accent);
        }

        #content h3 {
            font-size: 1rem;
            font-weight: 600;
            margin: 2rem 0 0.75rem;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
        }

        #content p {
            color: var(--subtitle);
            margin-bottom: 1rem;
            font-weight: 300;
            line-height: 1.8;
        }

        #content a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid var(--border-bright);
            transition: border-color 0.2s;
        }
        #content a:hover { border-color: var(--text); }

        #content ul, #content ol {
            padding-left: 0;
            margin: 1rem 0 1.5rem;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        #content ul li, #content ol li {
            color: var(--subtitle);
            font-size: 0.92rem;
            padding-left: 1.25rem;
            position: relative;
            font-weight: 300;
        }

        #content ul li::before {
            content: '—';
            position: absolute;
            left: 0;
            color: var(--muted);
            font-size: 0.8rem;
        }

        #content ol { counter-reset: list-counter; }
        #content ol li { counter-increment: list-counter; }
        #content ol li::before {
            content: counter(list-counter) '.';
            position: absolute;
            left: 0;
            color: var(--muted);
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }

        #content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82em;
            background: var(--surface-2);
            border: 1px solid var(--border-bright);
            padding: 0.1em 0.4em;
            color: #ccc;
            border-radius: 2px;
        }

        #content pre {
            background: var(--surface-2);
            border: 1px solid var(--border-bright);
            padding: 1.25rem 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            border-radius: 2px;
        }

        #content pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.85rem;
            color: #bbb;
        }

        #content blockquote {
            border-left: 2px solid var(--border-bright);
            padding-left: 1.25rem;
            margin: 1.5rem 0;
            color: var(--subtitle);
            font-style: italic;
        }

        #content blockquote strong {
            color: var(--text);
            font-style: normal;
        }

        #content img {
            max-width: 100%;
            display: block;
            margin: 1.5rem 0 0.5rem;
            border: 1px solid var(--border-bright);
        }

        #content em {
            color: var(--muted);
            font-size: 0.82rem;
            font-style: normal;
            display: block;
            margin-bottom: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        #content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 3rem 0;
        }

        #content strong { color: var(--text); font-weight: 600; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 2rem 1.5rem 4rem; }
            .topbar { padding: 0 1.5rem; }
            .topbar-links .btn-dl { display: none; }
            .action-strip { flex-direction: column; }
        }
    </style>
</head>

    <script type="text/markdown" id="md-source">
# CodeRunner Documentation

Welcome to **CodeRunner**, a precision-engineered desktop tool for running PHP and Laravel code locally. No cloud overhead, no browser tabs — just fast, deterministic code execution on your machine.

![CodeRunner Main Interface](../img/coderunner-main.png)
*CodeRunner — main interface showing the editor and results panel.*

## 📂 Opening a Laravel Project

CodeRunner works best when it understands your project structure.

1. Click the **Open** folder icon in the top header.
2. Select your Laravel project's root directory.
3. CodeRunner verifies the `artisan` file and begins indexing `app/` and `vendor/` in the background.

![Opening a Project](../img/open-project.gif)
*Animation: Selecting a Laravel project folder.*

> **Tip:** Indexing unlocks deep IntelliSense — Eloquent models, custom Facades, and trait chains.

## 🌐 Remote Execution

Run your PHP snippets locally or on remote environments without switching tools.

### SSH Connections

- Manage connections via the **Status Bar** or **Settings** menu.
- CodeRunner delegates to your system's native `ssh` command.
- Ensure your SSH agent is running and loaded with your private keys.

![SSH Connection Manager](../img/ssh-manager.gif)
*Adding a new SSH connection to run code remotely.*

### Docker Support

- Connect to containers such as Laravel Sail or custom PHP containers.
- Provide the container name or ID from the connection dialog.
- The container must have the required PHP binary available in its `$PATH`.

## 📊 SQL Runner

Execute raw SQL queries directly against your project's configured database.

- Supports **SQLite**, **MySQL**, and **PostgreSQL**.
- Results render in a high-performance reactive **Table View**.
- Sort, search, and filter columns without writing additional queries.

![SQL Runner in Action](../img/sql-runner.gif)
*Executing a query and viewing the reactive results table.*

## 📜 Log Viewer

Monitor your application logs in real time without a terminal.

- Automatically tails `storage/logs/laravel.log` when a project is open.
- Streams updates live as your application writes them.

![Log Tailing](../img/log-viewer.gif)
*Real-time log streaming from a Laravel application.*

## 🤖 Hybrid IntelliSense

CodeRunner combines deterministic LSP resolution with a custom Rust-powered symbol indexer for deep Laravel autocompletion.

- **Tiered Suggestions:** Common methods like `where()`, `get()`, and `find()` are prioritised.
- **AST-Based:** Understands your custom classes, traits, and inheritance chains.
- **Framework Aware:** Built-in maps for Facades, Eloquent magic methods, and service container bindings.

---

*CodeRunner — Simple. Fast. Deterministic.*

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Render markdown
        try {
            const mdSource = document.getElementById('md-source').innerHTML;
            const clean = mdSource.replace(/^[\s\uFEFF]+|[\s\uFEFF]+$/g, '');
            document.getElementById('content').innerHTML = marked.parse(clean);
        } catch (err) {
            document.getElementById('content').innerHTML = '<p>Error rendering docs: ' + err + '</p>';
        }

        // Active sidebar link on scroll
        const headings = document.querySelectorAll('#content h2, #content h1');
        const links = document.querySelectorAll('.sidebar-nav a');

        // Add IDs matching sidebar anchors to headings
        const anchorMap = {
            'CodeRunner Documentation': 'intro',
            'Opening a Laravel Project': 'opening-project',
            'Remote Execution': 'remote',
            'SSH Connections': 'ssh',
            'Docker Support': 'docker',
            'SQL Runner': 'sql-runner',
            'Log Viewer': 'log-viewer',
            'Hybrid IntelliSense': 'intellisense',
        };

        headings.forEach(h => {
            const text = h.textContent.replace(/^[^\w]+/, '').trim();
            for (const [key, id] of Object.entries(anchorMap)) {
                if (text.includes(key.replace(/^[^\w]+/, ''))) {
                    h.id = id;
                    break;
                }
            }
        });

        // Scroll spy
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    links.forEach(l => l.classList.remove('active'));
                    const match = document.querySelector(`.sidebar-nav a[href="#${entry.target.id}"]`);
                    if (match) match.classList.add('active');
                }
            });
        }, { rootMargin: '-30% 0px -60% 0px' });

        setTimeout(() => {
            document.querySelectorAll('[id]').forEach(el => observer.observe(el));
        }, 100);

        // In-app iframe bridge
        function sendAction(action) {
            window.parent.postMessage({ type: 'ACTION', action }, '*');
        }

        // Theme param for iframe embedding
        const params = new URLSearchParams(window.location.search);
        if (params.get('theme') === 'dark') document.body.classList.add('dark');
    </script>
